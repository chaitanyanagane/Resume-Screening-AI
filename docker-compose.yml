version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - sqlite-data:/app/data
      - uploads-data:/app/uploads
    environment:
      - DATABASE_URL=/app/data/hiresense.db
      - JWT_SECRET=hiresense_jwt_super_secret_key_change_in_production
      - CORS_ORIGINS=http://localhost:80,http://localhost:5173
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

volumes:
  sqlite-data:
  uploads-data:
